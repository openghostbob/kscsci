<!DOCTYPE html>
<html lang="zh-TW">
<head>

        body {
            font-family: 'Noto Sans TC', sans-serif;

</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app" class="max-w-3xl mx-auto py-6 px-4">

        <!-- 歡迎/載入畫面 -->
        <div id="start-view" class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-book-medical text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">高雄市護理人員甄選題庫</h1>
            <p class="text-gray-500 mb-8">總題庫：<span id="total-count">載入中...</span> 題 | 本次測驗：50 題</p>
            <div class="bg-amber-50 border border-amber-200 p-4 rounded-lg mb-8 text-left text-sm text-amber-800">
                <i class="fas fa-info-circle mr-2"></i> 系統已開啟「防重疊模式」：連續測驗將不會出現重複題目。
            </div>
            <button onclick="startQuiz()" class="w-full sm:w-64 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95">
                開始隨機測驗
            </button>
        </div>

        <!-- 測驗中介面 -->
        <div id="quiz-view" class="hidden">
            <div class="bg-white rounded-t-2xl shadow-sm p-5 border-b flex justify-between items-center">

                </div>
                <button onclick="toggleGrid()" class="p-2 hover:bg-gray-100 rounded-lg text-gray-500">
                    <i class="fas fa-th-large"></i>
                </button>
            </div>

            <div class="w-full bg-gray-100 h-1.5">
                <div id="progress-bar" class="bg-blue-500 h-1.5 transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="bg-white rounded-b-2xl shadow-lg p-6 sm:p-10 min-h-[400px]">
                <div id="question-text" class="text-xl font-bold text-gray-800 mb-8 leading-relaxed"></div>
                <div id="options-container" class="space-y-3"></div>

                <div class="flex justify-between items-center mt-12 pt-6 border-t">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-5 py-2.5 rounded-lg font-medium text-gray-500 hover:bg-gray-100 disabled:opacity-30">
                        <i class="fas fa-arrow-left mr-2"></i> 上一題
                    </button>
                    <button id="next-btn" onclick="nextQuestion()" class="px-8 py-2.5 bg-slate-800 hover:bg-black text-white rounded-lg font-bold shadow-md disabled:bg-gray-300">
                        <span id="next-btn-text">下一題</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 結果介面 -->
        <div id="result-view" class="hidden">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden text-center">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 py-10 text-white">
                    <div id="score-circle" class="w-32 h-32 border-4 border-white/30 rounded-full flex flex-col items-center justify-center mx-auto mb-4">
                        <span id="final-score" class="text-4xl font-bold">0</span>
                        <span class="text-xs opacity-70">SCORE</span>
                    </div>
                    <h2 class="text-2xl font-bold">測驗結束！</h2>
                </div>
                <div class="p-8">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <div class="text-gray-400 text-xs mb-1">答對題數</div>
                            <div id="correct-stat" class="text-xl font-bold text-gray-800">0 / 50</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <div class="text-gray-400 text-xs mb-1">得分百分比</div>
                            <div id="score-percent" class="text-xl font-bold text-gray-800">0%</div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <button onclick="toggleDetails()" id="detail-btn" class="flex-1 py-3 border-2 border-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-50">查看解析</button>
                        <button onclick="restartQuiz()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200">再次測驗</button>
                    </div>

                    <div id="details-list" class="hidden mt-10 text-left space-y-6 border-t pt-8"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 跳題 Modal -->
    <div id="grid-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <span class="font-bold">選題導覽</span>
                <button onclick="toggleGrid()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="grid-content" class="p-4 grid grid-cols-5 gap-2 max-h-[60vh] overflow-y-auto"></div>
        </div>
    </div>

                answer: "C"

                id: 519,
                question: "以精神醫療為例，在中老年醫學領域裡常見的心智障礙，簡稱『3D』現象，以下何者不是？",
                options: [

                    "(B) 譫妄(Delirium)",
                    "(C) 憂鬱(Depression)",
                    "(D) 失能(Disability)"
                ],
                answer: "D"
            },
            {
                id: 520,
                question: "關於鋰鹽的敘述，下列何者錯誤？",
                options: [
                    "(A) 中毒時，當濃度大於 2.0 mEq / L 中毒症狀：發燒、血壓下降、脈搏不規則、抽搐等",
                    "(B) 鋰鹽預防躁症比預防鬱症的效果佳",
                    "(C) 使用於治療維持期(maintenance )的鋰鹽濃度較躁期時所需的鋰鹽濃度低",
                    "(D) 最常見副作用是少尿"
                ],
                answer: "D"
            }


        ];

        // 狀態管理
        let allQuestions = rawQuestions;
        let currentQuizSet = [];
        let currentIndex = 0;
        let userAnswers = {};
        let isShowingDetails = false;

        // 初始化
        window.onload = function () {
            document.getElementById('total-count').innerText = allQuestions.length;
        };

        function shuffle(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function startQuiz() {
            // 從總題庫隨機挑選 50 題 (如果題庫不足 50 則全選)
            const shuffled = shuffle(allQuestions);
            currentQuizSet = shuffled.slice(0, 50);

            // 預處理正確答案文字
            currentQuizSet.forEach(q => {
                const correctChar = q.answer.split(',')[0].trim();
                q.correctOptionText = q.options.find(opt => opt.startsWith(`(${correctChar})`)) || `(正確答案: ${q.answer})`;
                q.shuffledOptions = shuffle(q.options);
            });

            currentIndex = 0;
            userAnswers = {};
            isShowingDetails = false;

            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuizSet[currentIndex];
            const container = document.getElementById('options-container');

            document.getElementById('question-counter').innerText = `Question ${currentIndex + 1} / ${currentQuizSet.length}`;
            document.getElementById('topic-info').innerText = `題號: ${q.id}`;
            document.getElementById('question-text').innerText = q.question;

            container.innerHTML = '';
            q.shuffledOptions.forEach(opt => {
                const isSelected = userAnswers[currentIndex] === opt;
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3 ${isSelected ? 'border-blue-500 bg-blue-50 text-blue-800' : 'border-gray-100 hover:bg-gray-50 text-gray-600'}`;
                btn.onclick = () => {
                    userAnswers[currentIndex] = opt;
                    renderQuestion();
                };
                btn.innerHTML = `
                        <div class="w-5 h-5 rounded-full border-2 mt-1 flex-shrink-0 flex items-center justify-center ${isSelected ? 'border-blue-500' : 'border-gray-300'}">
                            ${isSelected ? '<div class="w-2.5 h-2.5 bg-blue-500 rounded-full"></div>' : ''}
                        </div>
                        <span class="text-lg">${opt}</span>
                    `;
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = !userAnswers[currentIndex];
            document.getElementById('next-btn-text').innerText = (currentIndex === currentQuizSet.length - 1) ? "提交結果" : "下一題";
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / currentQuizSet.length) * 100}%`;
        }

        function nextQuestion() {
            if (currentIndex < currentQuizSet.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo(0, 0);
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo(0, 0);
            }
        }

        function showResult() {
            let correctCount = 0;
            currentQuizSet.forEach((q, idx) => {
                if (userAnswers[idx] === q.correctOptionText) {
                    correctCount++;
                }
            });

            const total = currentQuizSet.length;
            const score = Math.round((correctCount / total) * 100);

            document.getElementById('final-score').innerText = score;
            document.getElementById('correct-stat').innerText = `${correctCount} / ${total}`;
            document.getElementById('score-percent').innerText = `${score}%`;

            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function toggleDetails() {
            isShowingDetails = !isShowingDetails;
            const container = document.getElementById('details-list');
            const btn = document.getElementById('detail-btn');

            if (isShowingDetails) {
                container.classList.remove('hidden');
                btn.innerText = "隱藏解析";
                renderDetails();
            } else {
                container.classList.add('hidden');
                btn.innerText = "查看解析";
            }
        }

        function renderDetails() {
            const container = document.getElementById('details-list');
            container.innerHTML = '';

            currentQuizSet.forEach((q, idx) => {
                const userAns = userAnswers[idx];
                const isCorrect = userAns === q.correctOptionText;

                const item = document.createElement('div');
                item.className = `p-4 rounded-xl border-l-4 ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                item.innerHTML = `
                        <p class="font-bold text-gray-800 mb-2">${idx + 1}. ${q.question}</p>
                        <div class="text-sm space-y-1">
                            <div class="text-green-700 font-medium">正確答案：${q.correctOptionText}</div>
                            ${!isCorrect ? `<div class="text-red-600">您的選擇：${userAns || "未作答"}</div>` : ''}
                        </div>
                    `;
                container.appendChild(item);
            });
        }

        function toggleGrid() {
            const modal = document.getElementById('grid-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                const content = document.getElementById('grid-content');
                content.innerHTML = '';
                currentQuizSet.forEach((_, i) => {
                    const btn = document.createElement('button');
                    const isDone = userAnswers[i];
                    const isCurrent = currentIndex === i;
                    btn.className = `h-10 rounded-lg text-sm font-bold border ${isCurrent ? 'bg-blue-600 text-white' : isDone ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-white text-gray-300 border-gray-100'}`;
                    btn.innerText = i + 1;
                    btn.onclick = () => {
                        currentIndex = i;
                        renderQuestion();
                        modal.classList.add('hidden');
                    };
                    content.appendChild(btn);
                });
            }
        }

        function restartQuiz() {
            startQuiz();
        }
    </script>
