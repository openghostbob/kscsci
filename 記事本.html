<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 個人日誌整合版</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .calendar-container {
            background: var(--card-bg);
            width: 100%; max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 12px;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        header h2 { font-size: 1.2rem; margin: 0; }
        .nav-btn {
            background: #E5E5EA; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: bold;
        }
        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            text-align: center; font-size: 0.75rem; color: #8E8E93; margin-bottom: 8px;
        }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day {
            background: #FFF; border-radius: 8px; min-height: 80px;
            padding: 4px; display: flex; flex-direction: column;
            border: 1px solid #E5E5EA; overflow: hidden;
        }
        .day.today { border: 2px solid var(--ios-blue); background: #F0F7FF; }
        .day-number { font-size: 0.9rem; font-weight: bold; }
        .holiday-name {
            font-size: 0.6rem; color: var(--ios-red);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .task-summary {
            font-size: 0.65rem; color: #0056b3; background: #EAF5FF;
            border-radius: 4px; padding: 2px; margin-top: 2px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        /* Modal 彈窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
        }
        .modal {
            position: absolute; bottom: 0; width: 100%; background: white;
            border-radius: 20px 20px 0 0; padding: 20px;
        }
        textarea {
            width: 100%; height: 200px; border: 1px solid #D1D1D6;
            border-radius: 12px; padding: 12px; font-size: 1rem; margin: 15px 0;
        }
        .action-btn {
            padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem;
        }
        /* 頁尾備份區 */
        .backup-zone {
            margin-top: 20px; display: flex; gap: 10px;
        }
        .small-btn { font-size: 0.7rem; background: #8E8E93; color: white; padding: 5px 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h2 id="monthDisplay"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </header>
    <div class="weekdays">
        <div style="color:var(--ios-red)">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div style="color:var(--ios-red)">六</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
</div>

<div class="backup-zone">
    <button class="small-btn" onclick="exportData()">匯出備份檔</button>
    <button class="small-btn" onclick="document.getElementById('fileInput').click()">匯入紀錄</button>
    <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 id="modalTitle" style="margin:0"></h3>
        <textarea id="taskInput" placeholder="在此輸入紀錄內容..."></textarea>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; gap:10px;">
                <button class="action-btn" onclick="closeModal()" style="flex:1; background:#E5E5EA;">取消</button>
                <button class="action-btn" onclick="saveData()" style="flex:2; background:var(--ios-blue); color:white;">儲存</button>
            </div>
            <button class="action-btn" onclick="shareRecord()" style="background:var(--ios-green); color:white;">分享此則文字</button>
        </div>
    </div>
</div>

<script>
    const holidays = {
        "2026-01-01":"元旦", "2026-02-16":"除夕", "2026-02-17":"春節", "2026-02-18":"初二",
        "2026-02-19":"初三", "2026-02-20":"補假", "2026-02-28":"和平紀念日", "2026-04-03":"補假",
        "2026-04-04":"兒童節", "2026-04-05":"清明節", "2026-04-06":"補假", "2026-05-01":"勞動節",
        "2026-06-19":"端午節", "2026-09-25":"中秋節", "2026-10-09":"補假", "2026-10-10":"國慶日"
    };

    let current = new Date();
    let activeDate = "";

    function render() {
        const year = current.getFullYear();
        const month = current.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
        const grid = document.getElementById('daysGrid');
        grid.innerHTML = "";
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tasks = JSON.parse(localStorage.getItem('my_diary_data') || "{}");

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day" style="visibility:hidden"></div>`;

        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            const holiday = holidays[dateStr] || "";
            const taskText = tasks[dateStr] || "";
            const isWeekend = new Date(year, month, d).getDay() % 6 === 0;

            grid.innerHTML += `
                <div class="day ${isToday?'today':''}" onclick="openModal('${dateStr}')">
                    <span class="day-number" style="color:${(holiday || isWeekend)?'var(--ios-red)':'#000'}">${d}</span>
                    <span class="holiday-name">${holiday}</span>
                    ${taskText ? `<div class="task-summary">${taskText}</div>` : ''}
                </div>`;
        }
    }

    function changeMonth(diff) { current.setMonth(current.getMonth() + diff); render(); }

    function openModal(date) {
        activeDate = date;
        const tasks = JSON.parse(localStorage.getItem('my_diary_data') || "{}");
        document.getElementById('modalTitle').innerText = date + (holidays[date] ? " " + holidays[date] : "");
        document.getElementById('taskInput').value = tasks[date] || "";
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    function saveData() {
        const tasks = JSON.parse(localStorage.getItem('my_diary_data') || "{}");
        const val = document.getElementById('taskInput').value.trim();
        if(val) tasks[activeDate] = val; else delete tasks[activeDate];
        localStorage.setItem('my_diary_data', JSON.stringify(tasks));
        closeModal(); render();
    }

    // 分享功能
    function shareRecord() {
        const text = document.getElementById('taskInput').value;
        if(!text) return alert("沒有內容可以分享");
        const shareStr = `【${activeDate} 記事】\n${text}`;
        if(navigator.share) {
            navigator.share({ title: activeDate, text: shareStr });
        } else {
            navigator.clipboard.writeText(shareStr);
            alert("內容已複製，可直接貼上傳給朋友");
        }
    }

    // 匯出備份
    function exportData() {
        const data = localStorage.getItem('my_diary_data');
        const blob = new Blob([data], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `diary_backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    // 匯入備份
    function importData(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(confirm("匯入將會蓋過目前的紀錄，確定嗎？")) {
                    localStorage.setItem('my_diary_data', JSON.stringify(json));
                    render();
                }
            } catch(err) { alert("檔案格式不正確"); }
        };
        reader.readAsText(file);
    }

    render();
</script>
</body>
</html>
