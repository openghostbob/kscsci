<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的手機隨手記</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --holiday-color: #FF3B30;
            --task-bg: #EAF5FF;
            --task-text: #0056b3;
            --bg-color: #F2F2F7;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .calendar-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 12px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        header h2 { font-size: 1.3rem; margin: 0; color: #1c1c1e; }
        button {
            background: #E5E5EA;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            color: #8E8E93;
            margin-bottom: 8px;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day {
            background: #FFFFFF;
            border-radius: 8px;
            min-height: 75px; /* 增加高度以便顯示文字 */
            padding: 4px;
            display: flex;
            flex-direction: column;
            border: 1px solid #E5E5EA;
            overflow: hidden;
        }
        .day.today { border: 2px solid var(--primary-color); background: #F0F7FF; }
        .day-number { font-size: 0.9rem; font-weight: bold; margin-bottom: 2px; }
        
        /* 節日顯示 */
        .holiday-name {
            font-size: 0.65rem;
            color: var(--holiday-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        /* 重點：在日曆格子上直接顯示文字摘要 */
        .task-summary {
            font-size: 0.65rem;
            color: var(--task-text);
            background: var(--task-bg);
            border-radius: 4px;
            padding: 2px;
            line-height: 1.2;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* 最多顯示三行文字 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 彈出視窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            padding-bottom: 40px; /* 留給手機下方滑動條空間 */
        }
        #taskInput {
            width: 100%;
            height: 250px; /* 較大的輸入框 */
            border: 1px solid #D1D1D6;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            margin: 15px 0;
            background: #F9F9F9;
        }
        .btn-save { background: var(--primary-color); color: white; flex: 2; }
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthDisplay"></h2>
        <button onclick="changeMonth(1)">▶</button>
    </header>
    <div class="weekdays">
        <div style="color:var(--holiday-color)">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div style="color:var(--holiday-color)">六</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 id="modalTitle" style="margin:0">日期</h3>
        <textarea id="taskInput" placeholder="在此輸入今日筆記內容..."></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1">取消</button>
            <button class="btn-save" onclick="saveData()">儲存紀錄</button>
        </div>
    </div>
</div>

<script>
    const holidays = {
        "2026-01-01": "元旦", "2026-02-16": "除夕", "2026-02-17": "春節", 
        "2026-02-18": "初二", "2026-02-19": "初三", "2026-02-20": "補假",
        "2026-02-28": "和平紀念日", "2026-04-03": "補假", "2026-04-04": "兒童節",
        "2026-04-05": "清明節", "2026-04-06": "補假", "2026-05-01": "勞動節",
        "2026-06-19": "端午節", "2026-09-25": "中秋節", "2026-10-09": "補假", 
        "2026-10-10": "國慶日"
    };

    let current = new Date();
    let activeDate = "";

    function render() {
        const year = current.getFullYear();
        const month = current.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
        
        const grid = document.getElementById('daysGrid');
        grid.innerHTML = "";
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day" style="visibility:hidden"></div>`;

        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            const holiday = holidays[dateStr] || "";
            const taskText = tasks[dateStr] || "";
            const isWeekend = new Date(year, month, d).getDay() % 6 === 0;

            let dayHtml = `
                <div class="day ${isToday?'today':''}" onclick="openModal('${dateStr}')">
                    <span class="day-number" style="color:${(holiday || isWeekend)?'var(--holiday-color)':'#1c1c1e'}">${d}</span>
                    <span class="holiday-name">${holiday}</span>
                    ${taskText ? `<div class="task-summary">${taskText}</div>` : ''}
                </div>`;
            grid.innerHTML += dayHtml;
        }
    }

    function changeMonth(diff) {
        current.setMonth(current.getMonth() + diff);
        render();
    }

    function openModal(date) {
        activeDate = date;
        const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");
        document.getElementById('modalTitle').innerText = date + (holidays[date] ? " " + holidays[date] : "");
        document.getElementById('taskInput').value = tasks[date] || "";
        document.getElementById('modal').style.display = "block";
        document.body.style.overflow = "hidden"; // 防止背景捲動
    }

    function closeModal() {
        document.getElementById('modal').style.display = "none";
        document.body.style.overflow = "auto";
    }

    function saveData() {
        const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");
        const val = document.getElementById('taskInput').value.trim();
        if(val) tasks[activeDate] = val; else delete tasks[activeDate];
        localStorage.setItem('my_tasks', JSON.stringify(tasks));
        closeModal();
        render();
    }

    render();
</script>
</body>
</html>
