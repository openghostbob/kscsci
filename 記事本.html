<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 手機日誌</title>
    <style>
        :root {
            --primary-color: #007AFF; /* iOS 風格藍 */
            --holiday-color: #FF3B30; /* iOS 風格紅 */
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .calendar-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

            header h2 {
                font-size: 1.2rem;
                margin: 0;
            }

        button {
            background: #E5E5EA;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

            button#save-btn {
                background: var(--primary-color);
                color: white;
            }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            color: #8E8E93;
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            background: #FAFAFA;
            border-radius: 8px;
            aspect-ratio: 1 / 1.2;
            padding: 5px;
            display: flex;
            flex-direction: column;
            border: 1px solid #E5E5EA;
        }

            .day.today {
                border: 2px solid var(--primary-color);
                background: #F0F7FF;
            }

        .day-number {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .holiday-name {
            font-size: 0.6rem;
            color: var(--holiday-color);
            line-height: 1;
            margin-top: 2px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .has-task::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            background: #34C759;
            border-radius: 50%;
            margin: auto auto 2px auto;
        }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header>
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="monthDisplay">2026年 1月</h2>
            <button onclick="changeMonth(1)">▶</button>
        </header>
        <div class="weekdays">
            <div style="color:var(--holiday-color)">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div style="color:var(--holiday-color)">六</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle" style="margin:0">日期</h3>
            <textarea id="taskInput" placeholder="在此輸入今日筆記..."></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1">取消</button>
                <button id="save-btn" onclick="saveData()" style="flex:2">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 2026 節日資料 [cite: 2, 7, 10, 14, 22, 34, 38, 43]
        const holidays = {
            "2026-01-01": "元旦", "2026-02-16": "除夕", "2026-02-17": "春節",
            "2026-02-18": "初二", "2026-02-19": "初三", "2026-02-20": "補假",
            "2026-02-28": "和平紀念日", "2026-04-03": "補假", "2026-04-04": "兒童節",
            "2026-04-05": "清明節", "2026-04-06": "補假", "2026-05-01": "勞動節",
            "2026-06-19": "端午節", "2026-08-08": "父親節", "2026-09-25": "中秋節",
            "2026-10-09": "補假", "2026-10-10": "國慶日", "2026-12-25": "行憲紀念日"
        };

        let current = new Date(); // 預設開啟目前月份
        let activeDate = "";

        function render() {
            const year = current.getFullYear();
            const month = current.getMonth();
            document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="day" style="visibility:hidden"></div>`;

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const holiday = holidays[dateStr] || "";
                const hasTask = tasks[dateStr] ? "has-task" : "";
                const isWeekend = new Date(year, month, d).getDay() % 6 === 0;

                grid.innerHTML += `
                    <div class="day ${isToday ? 'today' : ''} ${hasTask}" onclick="openModal('${dateStr}')">
                        <span class="day-number" style="color:${(holiday || isWeekend) ? 'var(--holiday-color)' : '#000'}">${d}</span>
                        <span class="holiday-name">${holiday}</span>
                    </div>`;
            }
        }

        function changeMonth(diff) {
            current.setMonth(current.getMonth() + diff);
            render();
        }

        function openModal(date) {
            activeDate = date;
            const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");
            document.getElementById('modalTitle').innerText = date + (holidays[date] ? " " + holidays[date] : "");
            document.getElementById('taskInput').value = tasks[date] || "";
            document.getElementById('modal').style.display = "block";
        }

        function closeModal() { document.getElementById('modal').style.display = "none"; }

        function saveData() {
            const tasks = JSON.parse(localStorage.getItem('my_tasks') || "{}");
            const val = document.getElementById('taskInput').value.trim();
            if (val) tasks[activeDate] = val; else delete tasks[activeDate];
            localStorage.setItem('my_tasks', JSON.stringify(tasks));
            closeModal();
            render();
        }

        render();
    </script>
</body>
</html>
