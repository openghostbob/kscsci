<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人每日記事本 (含2026台灣假日)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --hover-color: #357abd;
            --bg-color: #f7f9fa;
            --text-color: #333;
            --holiday-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .calendar-container {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

            header h2 {
                margin: 0;
                font-size: 1.5rem;
            }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

            button:hover {
                background-color: var(--hover-color);
            }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: #666;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day {
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            min-height: 90px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

            .day:hover {
                border-color: var(--primary-color);
                box-shadow: 0 2px 8px rgba(74, 144, 226, 0.2);
            }

            .day.empty {
                background: transparent;
                border: none;
                cursor: default;
                box-shadow: none;
            }

        .day-number {
            font-weight: bold;
            margin-bottom: 2px;
        }

        .day.today {
            background-color: #eaf3fc;
            border: 2px solid var(--primary-color);
        }
        /* 假日文字標示 */
        .holiday-label {
            color: var(--holiday-color);
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 4px;
            min-height: 14px;
        }
        /* 待辦事項標示 */
        .task-indicator {
            font-size: 0.8rem;
            color: #27ae60;
            background: #eafaf1;
            padding: 2px 4px;
            border-radius: 4px;
            margin-top: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal 樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

            .modal h3 {
                margin-top: 0;
                margin-bottom: 16px;
            }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 16px;
        }

            textarea:focus {
                outline: none;
                border-color: var(--primary-color);
            }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-cancel {
            background-color: #6c757d;
        }

            .btn-cancel:hover {
                background-color: #5a6268;
            }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header>
            <button id="prev-btn">◀ 上個月</button>
            <h2 id="month-year-display"></h2>
            <button id="next-btn">下個月 ▶</button>
        </header>

        <div class="weekdays">
            <div style="color: #e74c3c;">日</div>
            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div>
            <div style="color: #e74c3c;">六</div>
        </div>
        <div class="days-grid" id="days-grid"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="modal-title"></h3>
            <textarea id="task-input" placeholder="請輸入今天的待辦事項、會議或心情日記..."></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancel-btn">取消</button>
                <button id="save-btn">儲存紀錄</button>
            </div>
        </div>
    </div>

    <script>
        const daysGrid = document.getElementById('days-grid');
        const monthYearDisplay = document.getElementById('month-year-display');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const taskInput = document.getElementById('task-input');
        const cancelBtn = document.getElementById('cancel-btn');
        const saveBtn = document.getElementById('save-btn');

        let currentDate = new Date(2026, 3, 1); // 預設開啟 2026 年 4 月以展示資料
        let selectedDateStr = null;

        // 2026年 台灣國定假日與放假 (依據您提供的月曆資料)
        const holidays2026 = {
            "2026-01-01": "元旦",
            "2026-02-16": "除夕",
            "2026-02-17": "春節",
            "2026-02-18": "春節",
            "2026-02-19": "春節",
            "2026-02-20": "補假",
            "2026-02-28": "和平紀念日",
            "2026-04-03": "補假",
            "2026-04-04": "兒童節",
            "2026-04-05": "清明節",
            "2026-04-06": "補假",
            "2026-05-01": "勞動節",
            "2026-06-19": "端午節",
            "2026-09-25": "中秋節",
            "2026-10-09": "補假",
            "2026-10-10": "國慶日"
        };

        function getTasks() {
            const tasks = localStorage.getItem('daily_tasks');
            return tasks ? JSON.parse(tasks) : {};
        }

        function saveTaskToStorage(dateStr, text) {
            const tasks = getTasks();
            if (text.trim() === '') {
                delete tasks[dateStr];
            } else {
                tasks[dateStr] = text.trim();
            }
            localStorage.setItem('daily_tasks', JSON.stringify(tasks));
        }

        function renderCalendar() {
            daysGrid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date(); // 真實的今天

            monthYearDisplay.textContent = `${year}年 ${month + 1}月`;

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const tasks = getTasks();

            // 填補月初的空白天數
            for (let i = 0; i < firstDayOfMonth; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'day empty';
                daysGrid.appendChild(emptyDiv);
            }

            // 產生當月天數
            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;

                // 標示今天
                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    dayDiv.classList.add('today');
                }

                // 日期數字
                const dayNum = document.createElement('div');
                dayNum.className = 'day-number';
                dayNum.textContent = i;

                // 如果是週末，將日期數字變紅色
                const currentDayOfWeek = new Date(year, month, i).getDay();
                if (currentDayOfWeek === 0 || currentDayOfWeek === 6) {
                    dayNum.style.color = 'var(--holiday-color)';
                }
                dayDiv.appendChild(dayNum);

                // 標示台灣國定假日
                const holidayName = holidays2026[dateStr];
                const holidayLabel = document.createElement('div');
                holidayLabel.className = 'holiday-label';
                if (holidayName) {
                    holidayLabel.textContent = holidayName;
                    // 若為假日，也可選擇將日期數字變紅
                    dayNum.style.color = 'var(--holiday-color)';
                }
                dayDiv.appendChild(holidayLabel);

                // 如果當天有自訂紀錄，顯示綠色提示
                if (tasks[dateStr]) {
                    const indicator = document.createElement('div');
                    indicator.className = 'task-indicator';
                    indicator.textContent = tasks[dateStr];
                    dayDiv.appendChild(indicator);
                }

                // 點擊開啟編輯視窗
                dayDiv.addEventListener('click', () => openModal(dateStr, tasks[dateStr] || ''));
                daysGrid.appendChild(dayDiv);
            }
        }

        function openModal(dateStr, existingText) {
            selectedDateStr = dateStr;
            const holidayText = holidays2026[dateStr] ? ` (${holidays2026[dateStr]})` : '';
            modalTitle.textContent = `${dateStr}${holidayText} 記事`;
            taskInput.value = existingText;
            modalOverlay.style.display = 'flex';
            taskInput.focus();
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
            selectedDateStr = null;
        }

        // 事件監聽器
        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        cancelBtn.addEventListener('click', closeModal);

        saveBtn.addEventListener('click', () => {
            if (selectedDateStr) {
                saveTaskToStorage(selectedDateStr, taskInput.value);
                renderCalendar();
                closeModal();
            }
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // 初始渲染
        renderCalendar();
    </script>

</body>
</html>
