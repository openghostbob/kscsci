        // 全域變數定義
        let currentQuestions = [];
        let currentState = {
            currentIdx: 0,
            answers: {},
            isFinished: false,
            score: 0,
            showGrid: false,
            showDetail: false
        };

        // 隨機洗牌函數 (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 初始化題庫數據
        function initQuizData() {
            // 深拷貝原始題庫數據
            const cloned = JSON.parse(JSON.stringify(rawQuestions));

            // 1. 打亂題目順序
            shuffle(cloned);

            // 2. 打亂每一題內部的選項順序並重新對應答案字母
            cloned.forEach(q => {
                const originalAnswerLetter = q.answer; // 例如 "B"
                const originalIndex = originalAnswerLetter.charCodeAt(0) - 65;
                const correctContent = q.options[originalIndex];

                // 洗牌選項陣列
                shuffle(q.options);

                // 找到正確內容現在的位置，並更新答案字母
                const newIndex = q.options.indexOf(correctContent);
                q.answer = String.fromCharCode(65 + newIndex);
            });

            currentQuestions = cloned;
        }

        function render() {
            const app = document.getElementById('app');

            if (currentState.isFinished) {
                app.innerHTML = renderResult();
                return;
            }

            const q = currentQuestions[currentState.currentIdx];
            const progress = ((currentState.currentIdx + 1) / currentQuestions.length) * 100;
            const selectedOpt = currentState.answers[q.id];

            app.innerHTML = `
                    <div class="bg-white rounded-t-xl shadow-sm p-6 border-b border-gray-100 sticky top-0 z-10">
                        <div class="flex justify-between items-center mb-4">
                            <h1 class="text-xl font-bold text-gray-800">112年高雄市護理甄選模擬考 (隨機出題模式)</h1>
                            <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium">單選題</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div class="bg-blue-600 h-2.5 rounded-full progress-bar" style="width: ${progress}%"></div>
                        </div>
                        <div class="flex justify-between items-end mt-2 text-sm">
                            <span class="text-gray-500">第 ${currentState.currentIdx + 1} 題 / 共 ${currentQuestions.length} 題</span>
                            <button onclick="toggleGrid()" class="text-blue-600 font-medium flex items-center gap-1">
                                快速跳題
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-b-xl shadow-lg p-6 sm:p-10 min-h-[400px] flex flex-col justify-between">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900 mb-8 leading-snug">${q.question}</h2>
                            <div class="space-y-4">
                                ${q.options.map((opt, idx) => {
                // 重新整理顯示標籤，確保 UI 始終顯示 (A) (B) (C) (D)
                const currentLabel = `(${String.fromCharCode(65 + idx)})`;
                const displayOpt = opt.replace(/^\([A-D]\)\s*/, "").trim();
                const fullDisplay = `${currentLabel} ${displayOpt}`;
                const isSelected = selectedOpt === fullDisplay;

                return `
                                        <button onclick="selectOption('${fullDisplay.replace(/'/g, "\\'")}')" class="w-full text-left p-4 rounded-xl border-2 flex items-start gap-3 transition-all ${isSelected ? 'border-blue-500 bg-blue-50 text-blue-900' : 'border-gray-200 hover:bg-gray-50 text-gray-700'}">
                                            <div class="w-6 h-6 rounded-full border-2 flex-shrink-0 mt-0.5 flex items-center justify-center ${isSelected ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}">
                                                ${isSelected ? '<div class="w-2.5 h-2.5 bg-white rounded-full"></div>' : ''}
                                            </div>
                                            <span class="text-lg">${fullDisplay}</span>
                                        </button>
                                    `;
            }).join('')}
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
                            <button onclick="prevQ()" ${currentState.currentIdx === 0 ? 'disabled' : ''} class="px-6 py-3 rounded-lg font-medium text-gray-600 disabled:text-gray-300">上一題</button>
                            <button onclick="nextQ()" ${!selectedOpt ? 'disabled' : ''} class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold shadow-md disabled:bg-gray-300 disabled:shadow-none transition-all active:scale-95">
                                ${currentState.currentIdx === currentQuestions.length - 1 ? '交卷計分' : '下一題'}
                            </button>
                        </div>
                    </div>
                    ${renderGridOverlay()}
                `;
        }

        function renderResult() {
            return `
                    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
                        <div class="bg-blue-600 px-6 py-8 text-center text-white">
                            <h2 class="text-3xl font-bold">測驗結果</h2>
                            <p class="mt-2 text-blue-100">113年高雄市政府衛生局所屬衛生所護理人員甄選</p>
                        </div>
                        <div class="px-6 py-8 text-center">
                            <div class="mb-8">
                                <span class="text-6xl font-bold text-gray-800">${currentState.score}</span>
                                <span class="text-2xl text-gray-500"> / 100 分</span>
                            </div>
                            <div class="flex justify-center gap-4 mb-8">
                                <button onclick="toggleDetail()" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg font-medium">${currentState.showDetail ? '隱藏詳情' : '查看錯題與詳解'}</button>
                                <button onclick="restartQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium">重新測驗 (重新隨機)</button>
                            </div>
                            ${currentState.showDetail ? renderDetailList() : ''}
                        </div>
                    </div>
                `;
        }

        function renderDetailList() {
            return currentQuestions.map((q, idx) => {
                const userAnsFull = currentState.answers[q.id];
                const userLetter = userAnsFull ? userAnsFull.match(/\(([A-D])\)/)[1] : "未答";
                const isCorrect = userLetter === q.answer;
                return `
                        <div class="text-left p-4 rounded-lg border-2 mb-4 ${isCorrect ? 'border-green-100 bg-green-50' : 'border-red-100 bg-red-50'}">
                            <h4 class="font-bold text-gray-800 text-lg mb-2">${idx + 1}. ${q.question}</h4>
                            <div class="text-sm space-y-1 text-gray-600 mb-2">
                                ${q.options.map((o, optIdx) => {
                    const label = `(${String.fromCharCode(65 + optIdx)})`;
                    const cleanContent = o.replace(/^\([A-D]\)\s*/, "").trim();
                    const isCorrectOpt = String.fromCharCode(65 + optIdx) === q.answer;
                    return `<div class="${isCorrectOpt ? 'text-green-700 font-bold' : ''}">${label} ${cleanContent}</div>`;
                }).join('')}
                            </div>
                            <div class="text-sm font-medium">
                                <span class="${isCorrect ? 'text-green-700' : 'text-red-600'}">您的答案: (${userLetter})</span>
                                ${!isCorrect ? `<span class="text-green-700 ml-4 font-bold">正確答案: (${q.answer})</span>` : ''}
                            </div>
                        </div>
                    `;
            }).join('');
        }

        function renderGridOverlay() {
            if (!currentState.showGrid) return '';
            return `
                    <div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col">
                            <div class="p-4 border-b flex justify-between items-center">
                                <h3 class="font-bold text-lg">題目導覽</h3>
                                <button onclick="toggleGrid()" class="text-gray-500 font-bold text-xl">×</button>
                            </div>
                            <div class="p-4 overflow-y-auto grid grid-cols-5 sm:grid-cols-8 gap-2">
                                ${currentQuestions.map((q, idx) => `
                                    <button onclick="jumpTo(${idx})" class="p-2 rounded-lg border text-sm font-medium ${currentState.currentIdx === idx ? 'bg-blue-600 text-white' : (currentState.answers[q.id] ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white')}">
                                        ${idx + 1}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
        }

        // 邏輯處理函數
        window.selectOption = (opt) => {
            currentState.answers[currentQuestions[currentState.currentIdx].id] = opt;
            render();
        };

        window.nextQ = () => {
            if (currentState.currentIdx < currentQuestions.length - 1) {
                currentState.currentIdx++;
                render();
            } else {
                calculateScore();
            }
        };

        window.prevQ = () => {
            if (currentState.currentIdx > 0) {
                currentState.currentIdx--;
                render();
            }
        };

        window.jumpTo = (idx) => {
            currentState.currentIdx = idx;
            currentState.showGrid = false;
            render();
        };

        window.toggleGrid = () => {
            currentState.showGrid = !currentState.showGrid;
            render();
        };

        window.toggleDetail = () => {
            currentState.showDetail = !currentState.showDetail;
            render();
        };

        window.restartQuiz = () => {
            initQuizData();
            currentState = {
                currentIdx: 0,
                answers: {},
                isFinished: false,
                score: 0,
                showGrid: false,
                showDetail: false
            };
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function calculateScore() {
            let correctCount = 0;
            currentQuestions.forEach(q => {
                const userAns = currentState.answers[q.id];
                if (userAns) {
                    const match = userAns.match(/\(([A-D])\)/);
                    if (match && match[1] === q.answer) correctCount++;
                }
            });
            currentState.score = Math.round((correctCount / currentQuestions.length) * 100);
            currentState.isFinished = true;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 初始化並執行程式
        initQuizData();
        render();
    </script>
</body>

</html>
